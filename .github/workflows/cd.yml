name: CD — Build + Push + Update IAAC

on:
  push:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run Tests
        run: ./mvnw test
        env:
          SPRING_PROFILES_ACTIVE: test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/inventory-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/inventory-backend:${{ github.sha }}

  update-iaac:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout IAAC repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/inventory-iaac-backend
          token: ${{ secrets.IAAC_TOKEN }}

      - name: Actualizar imagen en backend deployment
        run: |
          sed -i \
            "s|image: .*/inventory-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/inventory-backend:${{ github.sha }}|g" \
            base/backend/deployment.yml

      - name: Actualizar imagen en envoy deployment
        run: |
          sed -i \
            "s|image: .*/inventory-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/inventory-backend:${{ github.sha }}|g" \
            base/envoy/deployment.yml

      - name: Commit y Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add base/backend/deployment.yml base/envoy/deployment.yml
          
          if git diff --cached --quiet; then
            echo "No hay cambios en las imágenes"
            exit 0
          fi
          
          git commit -m "chore: update backend and envoy images to ${{ github.sha }}"
          git push